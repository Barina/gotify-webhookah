name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to release (e.g. v1.0.0)"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.25.1"

    - name: Install gomod-cap
      run: go install github.com/gotify/plugin-api/cmd/gomod-cap@latest

    - name: Build plugin binaries
      run: make GOTIFY_VERSION="v2.9.0" FILE_SUFFIX="-for-gotify-v2.9.0" build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: gotify-plugin-binaries
        path: build/*.so
        retention-days: 7

  release:
    needs: build
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: gotify-plugin-binaries
        path: build/

    - name: Upload to release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.event.release.tag_name }}
        files: build/*.so
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}